<!DOCTYPE html>
<html>
<head>
<title>Spell Analyzer</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a, #1e293b);
    color: #e2e8f0;
}

.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 900px;
    padding: 30px;
    border-radius: 16px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
}

h1 {
    text-align: center;
    font-size: 32px;
    background: linear-gradient(90deg, #38bdf8, #22c55e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

textarea {
    width: 100%;
    height: 140px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: #020617;
    color: white;
    margin-top: 10px;
}

input[type="file"] {
    margin-top: 10px;
}

button {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #22c55e, #16a34a);
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

.section {
    margin-top: 25px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #334155;
}

th {
    background: rgba(255,255,255,0.05);
}

.error { color: #ef4444; }
.type { color: #38bdf8; }
.suggestion { color: #22c55e; }

.final-box {
    margin-top: 10px;
    padding: 15px;
    border-radius: 10px;
    background: rgba(2,6,23,0.7);
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<h1>Spell Analyzer</h1>

<textarea id="textInput" placeholder="Enter text"></textarea>

<input type="file" id="fileInput">

<button onclick="sendData()">Analyze</button>

<div class="section" id="errorSection"></div>
<div class="section" id="finalSection"></div>

</div>
</div>

<script>
function sendData() {

    let file = document.getElementById("fileInput").files[0];
    let text = document.getElementById("textInput").value;

    let options;

    if (file) {
        let formData = new FormData();
        formData.append("file", file);

        options = {
            method: "POST",
            body: formData
        };
    } else {
        options = {
            method: "POST",
            body: text
        };
    }

    fetch("/check", options)
    .then(res => res.json())
    .then(data => {

        let rows = "";
        let finalSentence = "";

        data.errors.forEach(e => {

            if (e.word === "FINAL") {
                finalSentence = e.suggestion;
                return;
            }

            rows += `
                <tr>
                    <td class="error">${e.word}</td>
                    <td class="type">${e.type}</td>
                    <td class="suggestion">${e.suggestion}</td>
                </tr>
            `;
        });

        if (rows !== "") {
            document.getElementById("errorSection").innerHTML = `
                <h3>Detected Issues</h3>
                <table>
                    <tr>
                        <th>Word</th>
                        <th>Type</th>
                        <th>Suggestion</th>
                    </tr>
                    ${rows}
                </table>
            `;
        } else {
            document.getElementById("errorSection").innerHTML = "";
        }

        if (finalSentence !== "") {
            document.getElementById("finalSection").innerHTML = `
                <h3>Corrected Sentence</h3>
                <div class="final-box">${finalSentence}</div>
            `;
        } else {
            document.getElementById("finalSection").innerHTML = "";
        }

    });
}
</script>

</body>
</html>
