<!DOCTYPE html>
<html>
<head>
<title>Spell Analyzer</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a, #1e293b);
    color: #e2e8f0;
    height: 100vh;
}

.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
}

.container {
    width: 900px;
    padding: 30px;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

h1 {
    text-align: center;
    margin-bottom: 25px;
    font-weight: 700;
    letter-spacing: 1px;
    font-size: 32px;
    background: linear-gradient(90deg, #38bdf8, #22c55e, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

textarea {
    width: 100%;
    height: 140px;
    padding: 14px;
    font-size: 15px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(2,6,23,0.8);
    color: #e2e8f0;
    outline: none;
    resize: none;
}

textarea:focus {
    border-color: #38bdf8;
    box-shadow: 0 0 10px rgba(56,189,248,0.3);
}

button {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #22c55e, #16a34a);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 15px;
    font-style: bold;
    cursor: pointer;
    transition: all 0.2s ease;
}

button:hover {
    transform: scale(1.02);
    box-shadow: 0 0 15px rgba(34,197,94,0.4);
}

.section {
    margin-top: 30px;
}

.section-title {
    font-size: 16px;
    margin-bottom: 10px;
    color: #94a3b8;
}

table {
    width: 100%;
    border-collapse: collapse;
    border-radius: 10px;
    overflow: hidden;
}

th, td {
    padding: 12px;
}

th {
    background: rgba(255,255,255,0.05);
    text-align: left;
}

tr {
    background: rgba(2,6,23,0.7);
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

tr:hover {
    background: rgba(56,189,248,0.08);
}

.error {
    color: #ef4444;
}

.type {
    color: #38bdf8;
}

.suggestion {
    color: #22c55e;
}

.final-box {
    background: rgba(2,6,23,0.7);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 15px;
    line-height: 1.6;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<h1>SPELLING ANALYZER</h1>

<textarea id="inputText" placeholder="Enter your text"></textarea>
<button onclick="checkText()">ANALYZE</button>

<div class="section" id="errorSection"></div>
<div class="section" id="finalSection"></div>

</div>
</div>

<script>
function checkText() {

    let text = document.getElementById("inputText").value;

    fetch("/check", {
        method: "POST",
        body: text
    })
    .then(res => res.json())
    .then(data => {

        let rows = "";
        let finalSentence = "";

        data.errors.forEach(e => {

            if (e.word === "FINAL") {
                finalSentence = e.suggestion;
                return;
            }

            rows += `
                <tr>
                    <td class="error">${e.word}</td>
                    <td class="type">${e.type}</td>
                    <td class="suggestion">${e.suggestion}</td>
                </tr>
            `;
        });

        if (rows !== "") {
            document.getElementById("errorSection").innerHTML = `
                <div class="section-title">Detected Issues</div>
                <table>
                    <tr>
                        <th>Word</th>
                        <th>Type</th>
                        <th>Suggestion</th>
                    </tr>
                    ${rows}
                </table>
            `;
        } else {
            document.getElementById("errorSection").innerHTML = "";
        }

        if (finalSentence !== "") {
            document.getElementById("finalSection").innerHTML = `
                <div class="section-title">Corrected Sentence</div>
                <div class="final-box">${finalSentence}</div>
            `;
        } else {
            document.getElementById("finalSection").innerHTML = "";
        }

    });
}
</script>

</body>
</html>
